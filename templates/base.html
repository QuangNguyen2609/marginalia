<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Reader3{% endblock %}</title>
    <script>
        // Apply theme before render to prevent flash
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
    <style>
        /* ===== CSS Custom Properties ===== */
        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-gradient-1: #e8ecf1;
            --bg-gradient-2: #dce3ed;
            --text-primary: #1a1a2e;
            --text-secondary: #495057;
            --text-muted: #868e96;
            --accent: #5b7cf7;
            --accent-hover: #4a6cf5;
            --border: rgba(0, 0, 0, 0.08);
            --glass-bg: rgba(255, 255, 255, var(--glass-opacity, 0.6));
            --glass-blur: 20px;
            --glass-opacity: 1;
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html.dark {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-gradient-1: #111820;
            --bg-gradient-2: #0d1117;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent: #7b8ff7;
            --accent-hover: #6b7ff5;
            --border: rgba(255, 255, 255, 0.06);
            --glass-bg: rgba(22, 27, 34, var(--glass-opacity, 0.6));
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* ===== Reset & Base ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); }

        /* ===== Background Gradient ===== */
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(91, 124, 247, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.04) 0%, transparent 60%),
                var(--bg-primary);
        }

        html.dark .bg-gradient {
            background:
                radial-gradient(ellipse at 20% 20%, rgba(91, 124, 247, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.04) 0%, transparent 50%),
                var(--bg-primary);
        }

        /* ===== Glass Panel ===== */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--glass-shadow);
            transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
        }

        /* ===== Header / Toolbar ===== */
        .top-toolbar {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 12px;
        }

        .toolbar-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition), color var(--transition);
            font-size: 18px;
            width: 34px;
            height: 34px;
        }
        .toolbar-btn:hover { background: var(--border); color: var(--text-primary); }

        .opacity-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        .opacity-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        /* ===== Transition Utilities ===== */
        .slide-left {
            transform: translateX(-100%);
            transition: transform var(--transition);
        }
        .slide-left.sidebar-visible {
            transform: translateX(0);
        }

        .slide-right {
            transform: translateX(100%);
            transition: transform var(--transition);
        }
        .slide-right.sidebar-visible {
            transform: translateX(0);
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .top-toolbar { top: 8px; right: 8px; }
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <!-- Floating Toolbar -->
    <div class="top-toolbar glass-panel">
        {% block toolbar_extra_left %}{% endblock %}
        <button class="toolbar-btn" id="themeToggle" title="Toggle dark mode">
            <span id="themeIcon">☀️</span>
        </button>
        {% block toolbar_extra_right %}{% endblock %}
    </div>

    {% block body %}{% endblock %}

    <script>
        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        function updateThemeIcon() {
            themeIcon.textContent = document.documentElement.classList.contains('dark') ? '🌙' : '☀️';
        }
        updateThemeIcon();

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        });

        {% block extra_scripts %}{% endblock %}
    </script>
</body>
</html>
